<!DOCTYPE html>
<html>
<head>

    <title>INFJ Library</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

{% include 'navbar.html' %}

<div class="page">

    <h1>INFJ Library</h1>

    <p style="
        color:#cbd5e1;
        margin-bottom:40px;
    ">
        A curated sanctuary of books
        for deep thinkers and dreamers.
    </p>

    <div class="feature-grid">

        {% for book in books %}

            <div class="feature-card">

                <img
                    src="{{ book.cover }}"
                    style="
                        width:100%;
                        height:250px;
                        object-fit:cover;
                        border-radius:14px;
                        margin-bottom:20px;
                    "
                >

                <h3>{{ book.title }}</h3>

                <p>{{ book.author }}</p>

                <a
                    href="/read/{{ book.id }}"
                    class="hero-btn primary-btn"
                    style="margin-top:20px;"
                >
                    Read Now
                </a>

            </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
